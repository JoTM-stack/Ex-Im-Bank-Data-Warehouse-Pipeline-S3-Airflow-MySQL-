version: '3.8'

x-airflow-common: &airflow-common
  build: .
  env_file:
    - .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+pymysql://airflow:airflow@mysql:3306/airflow_metadata
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    GOV_DATA_PATH: /opt/airflow/gov_data
    AWS_DEFAULT_REGION: af-south-1
    DB_HOST: mysql
  depends_on:
    mysql:
      condition: service_healthy
  volumes:
    - ./dags:/opt/airflow/dags
    - .:/opt/airflow/gov_data
    - airflow_logs:/opt/airflow/logs

services:

  mysql:
    image: mysql:8.0
    container_name: govdata_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: govdata
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow
      AWS_DEFAULT_REGION: af-south-1
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  airflow-init:
    <<: *airflow-common
    container_name: gov_data-airflow-init-1
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password root123 --firstname Admin --lastname Admin --role Admin --email jaytm083@gmail.com || true"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: govdata_airflow_webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    command: webserver
    restart: on-failure

  airflow-scheduler:
    <<: *airflow-common
    container_name: govdata_airflow_scheduler
    depends_on:
      - airflow-init
    command: scheduler
    restart: on-failure

volumes:
  mysql_data:
  airflow_logs: